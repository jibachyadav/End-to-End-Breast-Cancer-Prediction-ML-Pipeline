# ══════════════════════════════════════════════════════
# MODEL CONFIGURATION
# ══════════════════════════════════════════════════════

training:
  test_size:    0.2
  random_state: 42
  cv_folds:     5        # cross validation folds

models:
  logistic_regression:
    enabled: false
    params:
      max_iter:      1000
      random_state:  42
      C:             1.0
      solver:        lbfgs

  random_forest:
    enabled: true
    params:
      n_estimators:  100
      random_state:  42
      max_depth:     10
      min_samples_split: 2

  xgboost:
    enabled: true
    params:
      n_estimators:  100
      random_state:  42
      learning_rate: 0.1
      max_depth:     6

  svm:
    enabled: false
    params:
      kernel:      rbf
      probability: true
      C:           1.0

evaluation:
  primary_metric: f1        # best model selected by this
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

artifacts:
  models_dir:   artifacts/models/
  best_model:   artifacts/models/best_model.pkl
  report_path:  logs/evaluation_report.json